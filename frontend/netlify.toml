[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Handle Single Page Application routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Proxy for Judge0 API
[[redirects]]
  from = "/judge0/*"
  to = "https://judge0-ce.p.rapidapi.com/:splat"
  status = 200
  force = true
  
  [redirects.headers]
    X-From = "Netlify"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "X-RapidAPI-Host, X-RapidAPI-Key, Content-Type"

[build.environment]
  NODE_VERSION = "18.18.0"
  NPM_VERSION = "9.8.1" 

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "unsafe-none"
    Cross-Origin-Embedder-Policy = "unsafe-none"
    Cross-Origin-Resource-Policy = "same-site"
    Content-Security-Policy = "frame-ancestors 'self' https://accounts.google.com https://*.googleusercontent.com https://*.youtube.com https://*.firebaseapp.com https://*.firebaseio.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebasestorage.app wss://*.firebaseio.com https://codecolab-852p.onrender.com wss://codecolab-852p.onrender.com https://*.rapidapi.com https://judge0-ce.p.rapidapi.com https://*.google.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; frame-src 'self' https://accounts.google.com https://*.firebaseapp.com https://*.googleusercontent.com;"
    Access-Control-Allow-Origin = "*"
    X-Frame-Options = "SAMEORIGIN" 